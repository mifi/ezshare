name: Build
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      # todo remove once fixed https://github.com/actions/setup-node/issues/531
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - run: yarn --immutable
      - run: yarn build
      - run: yarn workspace @ezshare/electron publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
